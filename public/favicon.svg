<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Dark modern background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Gradient for left side (e.g., Male) -->
    <linearGradient id="leftBar" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Gradient for right side (e.g., Female) -->
    <linearGradient id="rightBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)" />

  <g transform="translate(32, 54)">
    <!-- Center Line -->
    <line x1="0" y1="0" x2="0" y2="-44" stroke="#334155" stroke-width="1" stroke-linecap="round" stroke-dasharray="2, 2" />

    <!-- Inverted Population Pyramid Bars -->
    <!-- Age 0-10 (Bottom, narrowest) -->
    <rect x="-8" y="-6" width="7" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-6" width="8" height="4" rx="1" fill="url(#rightBar)" />

    <!-- Age 10-20 -->
    <rect x="-10" y="-12" width="9" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-12" width="11" height="4" rx="1" fill="url(#rightBar)" />

    <!-- Age 20-30 -->
    <rect x="-14" y="-18" width="13" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-18" width="14" height="4" rx="1" fill="url(#rightBar)" />

    <!-- Age 30-40 -->
    <rect x="-17" y="-24" width="16" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-24" width="18" height="4" rx="1" fill="url(#rightBar)" />

    <!-- Age 40-50 -->
    <rect x="-21" y="-30" width="20" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-30" width="22" height="4" rx="1" fill="url(#rightBar)" />

    <!-- Age 50-60 -->
    <rect x="-25" y="-36" width="24" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-36" width="23" height="4" rx="1" fill="url(#rightBar)" />

    <!-- Age 60+ (Top, widest) -->
    <rect x="-22" y="-42" width="21" height="4" rx="1" fill="url(#leftBar)" />
    <rect x="1" y="-42" width="24" height="4" rx="1" fill="url(#rightBar)" />
  </g>
</svg>